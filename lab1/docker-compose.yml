version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lab1-db
    restart: always
    environment:
      POSTGRES_USER: notes_user
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: notes_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - lab_network

  backend:
    build: .
    container_name: lab1-backend
    restart: always
    depends_on:
      - db
    command: sh -c "python migration_script_db.py && python app.py"
    volumes:
      - ./config.json:/etc/mywebapp/config.json:ro
    networks:
      - lab_network

  nginx:
    image: nginx:alpine
    container_name: lab1-nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - lab_network

volumes:
  pgdata:

networks:
  lab_network:
    driver: bridge